<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FAF8F3"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#C41E3A"/>

  <!-- Maple leaf (top right, large watermark) -->
  <g transform="translate(980, 60) scale(1.8)" opacity="0.07" fill="#C41E3A">
    <path d="M75 5 L65 35 L80 30 L60 60 L70 60 L50 90 L55 90 L45 120 L55 120 L50 130 L100 130 L95 120 L105 120 L100 90 L110 90 L90 60 L100 60 L80 30 L95 35 Z"/>
  </g>

  <!-- Top label -->
  <text x="80" y="100" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#C41E3A" letter-spacing="0.08em">MAPLETAX CALCULATOR</text>

  <!-- Main heading -->
  <text x="80" y="210" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#1A1A1A">Canadian Tax</text>
  <text x="80" y="295" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#1A1A1A">Calculator</text>

  <!-- Subtitle -->
  <text x="80" y="360" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#555555">Federal + provincial income tax, CPP, EI, and</text>
  <text x="80" y="396" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#555555">take-home pay for all 13 provinces · 2025 &amp; 2026</text>

  <!-- Mini breakdown bars -->
  <g transform="translate(80, 450)">
    <!-- Labels -->
    <text x="0" y="-8" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#888888">Sample: $80,000 income in Ontario</text>
    <!-- Bar segments -->
    <rect x="0"   y="0" width="430" height="36" rx="4" fill="#059669"/> <!-- Take-home -->
    <rect x="438" y="0" width="130" height="36" rx="4" fill="#2563EB"/> <!-- Federal -->
    <rect x="576" y="0" width="90"  height="36" rx="4" fill="#4F46E5"/> <!-- Provincial -->
    <rect x="674" y="0" width="68"  height="36" rx="4" fill="#D97706"/> <!-- CPP -->
    <rect x="750" y="0" width="30"  height="36" rx="4" fill="#E11D48"/> <!-- EI -->
    <!-- Bar labels -->
    <text x="215" y="23" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white">Take-home 54%</text>
    <text x="503" y="23" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white">Fed 16%</text>
    <text x="621" y="23" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white">Prov</text>
  </g>

  <!-- URL / domain -->
  <text x="80" y="590" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#888888">mapletaxcalculator.ca</text>

  <!-- Free badge -->
  <rect x="1050" y="560" width="106" height="38" rx="6" fill="#C41E3A"/>
  <text x="1103" y="584" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="white">FREE</text>
</svg>
