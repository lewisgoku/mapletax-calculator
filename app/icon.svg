<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#C41E3A"/>
  <!-- Display screen -->
  <rect x="5" y="4" width="22" height="10" rx="2" fill="white" fill-opacity="0.15"/>
  <!-- MT text -->
  <text x="16" y="13" font-family="Arial, sans-serif" font-size="9" font-weight="900" fill="white" text-anchor="middle">MT</text>
  <!-- Calculator keypad row 1 -->
  <rect x="5"  y="16" width="6" height="4" rx="1" fill="white" fill-opacity="0.85"/>
  <rect x="13" y="16" width="6" height="4" rx="1" fill="white" fill-opacity="0.85"/>
  <rect x="21" y="16" width="6" height="4" rx="1" fill="white" fill-opacity="0.55"/>
  <!-- Calculator keypad row 2 -->
  <rect x="5"  y="22" width="6" height="4" rx="1" fill="white" fill-opacity="0.85"/>
  <rect x="13" y="22" width="6" height="4" rx="1" fill="white" fill-opacity="0.85"/>
  <rect x="21" y="22" width="6" height="4" rx="1" fill="white" fill-opacity="0.55"/>
  <!-- Calculator keypad row 3: wide zero + equals -->
  <rect x="5"  y="28" width="14" height="3" rx="1" fill="white" fill-opacity="0.85"/>
  <rect x="21" y="28" width="6"  height="3" rx="1" fill="white" fill-opacity="0.55"/>
</svg>
